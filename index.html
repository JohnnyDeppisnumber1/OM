<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfferMatch</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #3675F6;
      color: white;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: white;
      color: #172554;
      border-radius: 24px;
      padding: 32px;
      max-width: 720px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    h1 {
      margin: 0 0 16px;
      font-size: 48px;
      line-height: 0.95;
    }
    p {
      margin: 0;
      font-size: 22px;
      line-height: 1.5;
      color: #4E6188;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>OfferMatch</h1>
    <p>Лендинг проекта </p>
  </div>
</body>
</html>
